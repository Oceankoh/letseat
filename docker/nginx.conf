server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header Cache-Control "no-store";

  location = /service-worker.js {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  location = /manifest.webmanifest {
    add_header Content-Type "application/manifest+json";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
